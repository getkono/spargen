openapi: 3.1.0
info:
  title: Petstore
  version: 1.0.0
  description: A small OpenAPI 3.1 surface exercising spargen end to end.
servers:
  - url: http://127.0.0.1:0
    description: Replaced at runtime by the example's mock server address.
security:
  - bearerAuth: []
paths:
  /pets:
    get:
      operationId: listPets
      summary: List pets, optionally filtered.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/Status"
        - name: X-Request-Id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: The matching pets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pets"
    post:
      operationId: createPet
      summary: Register a new pet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          description: The stored pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Fetch one pet by id.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: No such pet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePet
      summary: Remove a pet.
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Status:
      type: string
      description: Sale status of a pet.
      enum: [available, sold]
    Pet:
      type: object
      description: A pet in the store.
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        tag:
          type: string
    NewPet:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tag:
          type: string
    Pets:
      type: array
      items:
        $ref: "#/components/schemas/Pet"
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
