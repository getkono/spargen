# cargo-deny configuration — supply-chain gate run on every PR.
# Licenses, security advisories, and duplicate/banned dependencies.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Spargen and its dependency surface are permissive-only.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # Mozilla's bundled CA roots (`webpki-roots`), reached through the reqwest rustls-tls stack
    # used by `spargen lock`. A permissive data license; the generated-output runtime graph is
    # unaffected (it carries its own default-features-off reqwest).
    "CDLA-Permissive-2.0",
    # `notify` (the CLI `generate --watch` file watcher, via `notify-debouncer-mini`) is dedicated
    # to the public domain under CC0-1.0 — maximally permissive. CLI-only: it never enters a
    # library/build.rs graph nor the generated-output runtime.
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
