# cargo-deny configuration — supply-chain gate run on every PR (PRD §7.6).
# Licenses, security advisories, and duplicate/banned dependencies.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Spargen and its dependency surface are permissive-only.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
